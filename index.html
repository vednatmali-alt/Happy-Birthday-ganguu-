<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ganguuu 💕</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9ecf,#ffd6ea);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
max-width:500px;
}

img{
width:220px;
height:220px;
border-radius:20px;
object-fit:cover;
}

h1{
color:#ff2e7a;
}

button{
background:#ff2e7a;
color:white;
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

#msg{
display:none;
margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<img src="images/photo1.jpg">

<h1>🎂 Happy Birthday Ganguuu 💕</h1>

<button onclick="document.getElementById('msg').style.display='block'">
🎁 Open Surprise
</button>

<div id="msg">
<h2>Dear Ganguuu 💖</h2>

<p>
May your smile always shine bright,
your dreams come true,
and your life be filled with happiness,
love and beautiful memories.

Thank you for being the sweetest best friend.

Happy Birthday! 🎉💕
</p>

</div>

</div>

</body>
</html>
